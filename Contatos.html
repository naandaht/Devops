<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Contato</title>
</head>
<body>

    <h1>Entre em Contato</h1>

    <p>Preencha o formulário abaixo para enviar sua mensagem.</p>

    <form>

        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome"><br><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="telefone">Telefone:</label><br>
        <input type="tel" id="telefone" name="telefone"><br><br>

        <label for="assunto">Assunto:</label><br>
        <input type="text" id="assunto" name="assunto"><br><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="mensagem" rows="5" cols="30"></textarea><br><br>

        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">

    </form>

    <hr>

    <h2>Informações de Contato</h2>

    <p><strong>Empresa:</strong> Tech Soluções</p>
    <p><strong>E-mail:</strong> contato@techsolucoes.com</p>
    <p><strong>Telefone:</strong> (47) 99999-9999</p>
    <p><strong>Endereço:</strong> Rua das Flores, 123 - Centro</p>

</body>
</html>
